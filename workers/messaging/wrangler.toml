# Messaging Plane. See docs/04-serverless-architecture.md.
# HARD RULE: this config may bind DB_MSG, MEDIA (R2), and the Messaging-Plane Durable Objects
# below — nothing else. It must never gain a binding to DB_ENROLL or any Enrollment-Plane
# secret (OAUTH_CLIENT_SECRET, PPID_HMAC_SECRET) — schema-lint checks this file for exactly that.
# R25 (2026-07): real OHTTP (RFC 9458) is implemented, not a stub — this Worker's `/ohttp/keys` +
# `/ohttp/gateway` routes are the Gateway role (src/index.ts, @vorticity/ohttp); a separate
# `workers/ohttp-relay` is the Relay role clients actually connect to in front of it. Wraps the three
# routes docs/04's Flow 1/2 diagrams draw through the Relay PLUS `/queue/:id/push` (the real message
# send path — see docs/06's R25 entry for why that one was a same-day follow-up, not in the first
# pass). WebSocket upgrades (`/queue/:id` subscribe, `/conv/:id`) structurally CANNOT be OHTTP-wrapped
# — see index.ts's header comment near the /queue routes for the honest, permanent residual gap.
# Same-zone Relay topology note (2026-07): see workers/ohttp-relay/wrangler.toml's header comment —
# this Worker and the Relay currently share one Cloudflare account (temporary, weaker than the
# originally-planned cross-zone split; see docs/deploy-checklist.md §5 and docs/06's R26 entry).
name = "vorticity-messaging"
main = "src/index.ts"
compatibility_date = "2026-02-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "api.vort.xfeatures.net"
custom_domain = true

[[d1_databases]]
binding = "DB_MSG"
database_name = "vortic-msg-db"
database_id = "37f7a573-3f7a-4a3c-9f55-ba3c4c4d1966"

# SESSION_SIGNING_KEY is a real secret — local dev loads it from `.dev.vars` (gitignored; see
# `.dev.vars.example`), production via `wrangler secret put`. NEVER add a secret-shaped value to a
# [vars] block — schema-lint checks for exactly that pattern (var names matching /SECRET|KEY|SIGNING|PRIVATE/i).

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "vorticity-media"

[[durable_objects.bindings]]
name = "MERKLE_TREE_DO"
class_name = "MerkleTreeDO"

[[durable_objects.bindings]]
name = "QUEUE_DO"
class_name = "QueueDO"

[[durable_objects.bindings]]
name = "GROUP_DO"
class_name = "GroupDO"

[[durable_objects.bindings]]
name = "CONV_LOG_DO"
class_name = "ConvLogDO"

[[durable_objects.bindings]]
name = "PRESENCE_DO"
class_name = "PresenceDO"

[[durable_objects.bindings]]
name = "PREKEY_DO"
class_name = "PrekeyDO"

[[durable_objects.bindings]]
name = "DEVICE_LINK_DO"
class_name = "DeviceLinkDO"

[[durable_objects.bindings]]
name = "DEVICE_LEASE_DO"
class_name = "DeviceLeaseDO"

[[durable_objects.bindings]]
name = "ALIAS_DO"
class_name = "AliasDO"

[[durable_objects.bindings]]
name = "RATE_GATE_DO"
class_name = "RateGateDO"

# K8 (2026-07): append-only Key Transparency log for alias->key bindings — see KeyTransparencyDO.ts.
[[durable_objects.bindings]]
name = "KEY_TRANSPARENCY_DO"
class_name = "KeyTransparencyDO"

# SQLite-backed DOs (GA on Workers Free+, see docs/04 "Cloudflare limits"). new_sqlite_classes
# is required the first time each class ships; do not edit this block for existing classes later
# (Durable Object migrations are append-only history, like D1 migrations).
[[migrations]]
tag = "v1"
new_sqlite_classes = [
  "MerkleTreeDO",
  "QueueDO",
  "GroupDO",
  "ConvLogDO",
  "PresenceDO",
  "AliasDO",
  "RateGateDO",
]

# PrekeyDO (rotation pass, 2026-07) — a genuinely NEW class added after v1 shipped, so it gets its
# own migration tag rather than editing v1's array (append-only history, per the comment above).
[[migrations]]
tag = "v2"
new_sqlite_classes = ["PrekeyDO"]

# DeviceLinkDO + DeviceLeaseDO (device-linking pass, 2026-07) — same append-only reasoning as v2 above.
[[migrations]]
tag = "v3"
new_sqlite_classes = ["DeviceLinkDO", "DeviceLeaseDO"]

# KeyTransparencyDO (K8 pass, 2026-07) — same append-only reasoning as v2/v3 above.
[[migrations]]
tag = "v4"
new_sqlite_classes = ["KeyTransparencyDO"]
