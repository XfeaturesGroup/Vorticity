[package]
name = "vortic-core"
version = "0.0.0"
edition = "2021"
description = "Vorticity cryptographic core ŌĆö compiled once, run on client (full) and edge (verify-only)."
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Default: full client build ŌĆö proving, encryption, decryption, ratchet state, all of it.
default = ["client-full"]
client-full = [
    "dep:ml-kem",
    "dep:x25519-dalek",
    "dep:kem",
    "dep:chacha20poly1305",
    "dep:base64",
    "dep:getrandom",
    "dep:bip39",
    "dep:aes-gcm",
    "dep:openmls",
    "dep:openmls_traits",
    "dep:openmls_basic_credential",
    "dep:openmls_rust_crypto",
    "dep:js-sys",
    "dep:serde_json",
]
# Edge builds (Cloudflare Workers) must be able to compile WITHOUT linking any decryption or
# proving code ŌĆö this is the crate-level enforcement of docs/03 crypto invariant #4 ("the edge
# only ever *verifies* ... and holds no decryption keys, ever"). `cargo build --no-default-features
# --features edge-verify-only` must succeed and the resulting binary must contain no ratchet/KEM
# decrypt, no MLS decrypt, no OPRF blind-side, and no Groth16 *prover* ŌĆö verifier-only.
edge-verify-only = []
# Additive: enables the RSA blind-signature ISSUER operation (`blind_sig::blindsig_sign`, which needs
# the issuer's RSA private key) and offline keypair generation. This is deliberately a THIRD,
# orthogonal feature ŌĆö not folded into `client-full` (a client never signs) and not part of
# `edge-verify-only`'s default set (the Messaging Plane's WASM build must never even COMPILE the
# secret-key-handling code, not just "not call it" ŌĆö see blind_sig.rs's module doc for why this is
# stricter than the existing `oprf::evaluate` precedent). Only `workers/enrollment` enables this,
# combined with `edge-verify-only` (it needs no ml-kem/AEAD/client machinery either).
issuer-full = []

[dependencies]
wasm-bindgen = "0.2"
zeroize = { version = "1", features = ["derive"] }
# Always-compiled (both profiles): util.rs (HKDF), and oprf::evaluate / future ring::verify need
# Ristretto point arithmetic even on edge-verify-only ŌĆö see oprf.rs's doc comment for why that's
# safe (evaluate needs a secret key the Messaging Plane never holds; it isn't decryption).
sha2 = "0.11.0"
hkdf = "0.13.0"
curve25519-dalek = "5.0.0"

# Always-compiled in BOTH profiles: the Groth16/BN254 verifier (zk.rs). Verification is safe on the
# edge ŌĆö it holds no secret and decrypts nothing (docs/03 invariant #4) ŌĆö so these are unconditional
# deps, not optional. `default-features = false` pulls arkworks in no_std + alloc mode, which links
# cleanly into this std crate and, critically, compiles for wasm32-unknown-unknown without the
# `parallel`/rayon or `std` features (verification is deterministic ŌĆö no RNG, no getrandom backend).
ark-bn254 = { version = "0.6.0", default-features = false, features = ["curve"] }
ark-ff = { version = "0.6.0", default-features = false }
ark-groth16 = { version = "0.6.0", default-features = false }

# Always-compiled in BOTH profiles: RSA blind signatures (RFC 9474 / RSABSSA), the Plane Bridge
# replacing VOPRF for the enrollment<->messaging redemption token (see blind_sig.rs). `verify()` needs
# no secret and must run on the edge (messaging), so this crate itself is unconditional ŌĆö same
# reasoning as ark-bn254/ark-groth16 above. `default-features = false` drops its `serde` feature
# (unneeded; we hand-roll the wasm-bindgen byte contract like every other module here).
blind-rsa-signatures = { version = "0.17.2", default-features = false }
# Always-compiled in BOTH profiles (R18, 2026-07): Ed25519 sign+verify for alias-ownership actions
# (alias_sig.rs). `Verifier::verify` needs no secret and must run on the edge ŌĆö AliasDO checks a
# revoke signature against the plaintext `alias_pub` column without ever holding the owner's signing
# key ŌĆö same "verification is edge-safe" reasoning as ark-bn254/blind-rsa-signatures above, and the
# same crate ratchet.rs already used for PQXDH prekey-bundle signing (client-full only, unaffected ŌĆö
# only this Cargo-level dependency gate moved, ratchet.rs's own module stays client-full-gated at
# lib.rs). `Signer::sign` (the secret-key half) is only ever CALLED from client-full-gated code
# (alias_sig::sign, ratchet.rs) ŌĆö linking the crate unconditionally doesn't expose it at the edge,
# same distinction blind-rsa-signatures already draws between "linked" and "callable".
ed25519-dalek = { version = "2", default-features = false, features = ["alloc", "zeroize"] }
# Always-compiled in BOTH profiles (R16, 2026-07): Argon2id-hardened PoW (`pow.rs`'s `argon2id` stamp
# algorithm alongside the existing SHA-256 Hashcash one) ŌĆö memory-hard, botnet/GPU-resistant, per
# docs/03 ┬¦8.3's own named `Hpow` alternative. Moved out of the `client-full`-only set `backup.rs`
# originally added it under: `pow::verify` must remain edge-safe (same "verification is edge-safe"
# reasoning as ed25519-dalek/blind-rsa-signatures above) and now needs to compute an Argon2id digest
# too, not just SHA-256 ŌĆö `backup.rs`'s own usage (key derivation, `client-full`-gated at the MODULE
# level in lib.rs) is completely unaffected by this dependency-gate move, since it never touched
# `edge-verify-only`'s dependency set either way; only the Cargo-level `dep:` gate moved. `default-
# features = false` + `alloc`: same rationale as `backup.rs`'s existing usage (raw KDF via
# `hash_password_into`, no RNG needed ŌĆö PoW's own salt is also a fixed, domain-separated constant,
# for the same class of reason: the varying `counter`/`salt` fields already live INSIDE the hashed
# stamp string, so Argon2id's own salt parameter doesn't need to vary per call here either).
argon2 = { version = "0.5", default-features = false, features = ["alloc"] }
# blind-rsa-signatures pulls `rand 0.10` -> `getrandom 0.4` transitively (a DIFFERENT major version
# than the `getrandom 0.2` below, which symmetric.rs's nonce uses ŌĆö Cargo resolves both as distinct
# crate instances; aliasing avoids a `[dependencies.getrandom]` key collision in this file). The
# "wasm_js" feature must be turned on for that 0.4.x instance or `wasm32-unknown-unknown` fails to
# compile at all (getrandom 0.4 has a hard `compile_error!` otherwise) ŌĆö verified via a scratch probe
# crate before adding this dependency for real. Needed even for verify-only builds: the whole
# blind-rsa-signatures crate (and its `rand`/`getrandom` deps) is linked regardless of which of its
# functions get called, so this feature must be on unconditionally, not gated to issuer-full/client-full.
getrandom04 = { package = "getrandom", version = "0.4", features = ["wasm_js"] }

# client-full only: key generation, encapsulation/decapsulation, blinding. Optional so a
# `--no-default-features --features edge-verify-only` build never links them. Both ml-kem's
# from_seed/encapsulate_deterministic and x25519-dalek's StaticSecret::from(bytes) are fully
# deterministic given caller-supplied entropy, so no RNG crate (rand_core/rand_chacha) or
# `getrandom` WASM backend is needed anywhere in this crate.
ml-kem = { version = "0.3.2", optional = true }
x25519-dalek = { version = "3.0.0", optional = true, features = ["static_secrets"] }
kem = { version = "0.3.0", optional = true }

# client-full only: real symmetric AEAD (Phase 1). ChaCha20-Poly1305 is a good WASM target ŌĆö pure
# software, no AES-NI dependency, constant-time. `default-features = false` + `alloc` gives the Vec
# `Aead` API without pulling the crate's own `getrandom`/rand wiring; the 12-byte nonce is filled by
# `getrandom` directly (feature "js" selects the browser `crypto.getRandomValues` backend on
# wasm32-unknown-unknown; on native targets the feature is inert and the OS backend is used, so
# `cargo test --features client-full` still builds). base64 encodes nonce||ciphertext||tag for the wire.
chacha20poly1305 = { version = "0.10", optional = true, default-features = false, features = ["alloc"] }
base64 = { version = "0.22", optional = true }
getrandom = { version = "0.2", optional = true, features = ["js"] }

# client-full only (R12): local-first E2EE backups (backup.rs), docs/03 ┬¦11. `bip39` for the
# recovery-phrase <-> seed conversion (default features: `std` + `unicode-normalization`, needed to
# validate/normalize a user-typed phrase per the BIP39 spec ŌĆö English wordlist is built in, no
# extra language feature needed). `argon2` moved to an unconditional dependency above (2026-07,
# "Argon2id hardened PoW" pass) ŌĆö see that entry's comment; `backup.rs`'s own usage is unaffected.
# `aes-gcm`, same `alloc`-only shape as `chacha20poly1305` above (default features add a
# `getrandom` wiring this crate doesn't need ŌĆö the nonce is filled via the SAME
# `getrandom::getrandom` call symmetric.rs already uses).
bip39 = { version = "2", optional = true }
aes-gcm = { version = "0.10", default-features = false, features = ["alloc", "aes"], optional = true }

# client-full only: real MLS (RFC 9420) group encryption (group.rs). Chosen over the AWS `mls-rs`
# alternative after investigating both ŌĆö user decision, recorded here for the next reader: neither
# has a confirmed third-party security audit, but openmls's `openmls-wasm` package + CI wasm32
# build target (builds, though not test-run, on that target by the maintainers) is a stronger
# WASM-maturity signal than mls-rs's own explicit "Experimental" label on its only WASM-viable
# crypto backend. `openmls_rust_crypto` (not `libcrux-provider`, the other in-tree option) ŌĆö verified
# by actually building both `--target wasm32-unknown-unknown` before deciding: `libcrux-provider`
# pulls `rayon` (real-thread data-parallelism, meaningless/risky on a target with no OS threads by
# default) into the graph; `openmls_rust_crypto` does not, and is built on the SAME `RustCrypto`/
# `curve25519-dalek` family this crate already depends on elsewhere (a familiar, not novel, trust
# surface at the primitive level ŌĆö the audit gap is in openmls's OWN protocol-state-machine code,
# not in the elliptic-curve math it calls out to). `features = ["js"]` is REQUIRED for
# wasm32-unknown-unknown (openmls has a hard `compile_error!` without it ŌĆö needs browser
# `crypto.getRandomValues`/`Date.now()` via `getrandom`'s js backend and `fluvio-wasm-timer`) ŌĆö
# openmls's own README calls enabling `js` in a *library* "strongly discouraged" because it forces
# that backend even for non-web wasm targets (wasi etc.); this crate never targets those, so the
# caveat doesn't apply here. Verified via `cargo build --release --target wasm32-unknown-unknown`
# (not just `cargo check`) and `cargo tree --features edge-verify-only`: `openmls`/`rayon` are
# absent from the edge-verify-only dependency graph ŌĆö same plane-separation check every other
# client-full-only dependency in this file already gets.
openmls = { version = "0.8.1", default-features = false, features = ["js", "openmls_rust_crypto"], optional = true }
js-sys = { version = "0.3.103", optional = true }
serde_json = { version = "1.0.151", optional = true }
openmls_traits = { version = "0.5.0", optional = true }
openmls_basic_credential = { version = "0.5.0", optional = true }
# PATCHED locally ŌĆö see `[patch.crates-io]` below and vendor/openmls_rust_crypto/README.md for why
# (v0.5.1's own X-Wing KEM wiring is a literal `unimplemented!()`, even though the underlying
# hpke-rs-rust-crypto primitive it would call already exists) and exactly what changed (2 match arms).
openmls_rust_crypto = { version = "0.5.1", optional = true }

[dev-dependencies]
ark-relations = { version = "0.6.0", default-features = false }
ark-snark = { version = "0.6.0", default-features = false }
ark-std = "0.6.0"
wasm-bindgen-test = "0.3"

[patch.crates-io]
# R7 PQ-ciphersuite pass (2026-07-23): wires X-Wing (hybrid ML-KEM-768+X25519) into MLS groups by
# fixing a 2-match-arm gap in openmls_rust_crypto 0.5.1 (its own X-Wing wiring was a literal
# `unimplemented!()`, despite the underlying hpke-rs-rust-crypto primitive already existing ŌĆö see
# vendor/openmls_rust_crypto/README.md for the full diff and exactly why this is a vendor+patch, not
# new cryptography). REMOVE once upstream ships this fix in a released version.
openmls_rust_crypto = { path = "vendor/openmls_rust_crypto" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
